// ===== 解析数据 =====
function parseData(raw) {
  const lines = raw.trim().split('\n');
  return lines.map(line => {
    const p = line.split(',');
    return {
      date: p[0],
      open: +p[1], high: +p[2], low: +p[3], close: +p[4],
      pre_close: +p[5], change: +p[6], pct_chg: +p[7],
      vol: +p[8], amount: +p[9]
    };
  });
}

function formatDate(d) {
  return d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
}

const data = parseData(RAW);
const dates = data.map(d => formatDate(d.date));

// ===== 统计卡片 =====
function renderStats() {
  const first = data[0];
  const last = data[data.length - 1];
  const yearHigh = Math.max(...data.map(d => d.high));
  const yearLow = Math.min(...data.map(d => d.low));
  const yearChange = last.close - first.close;
  const yearPct = (yearChange / first.close * 100).toFixed(2);
  const avgVol = (data.reduce((s,d) => s + d.vol, 0) / data.length / 10000).toFixed(2);
  const totalAmount = (data.reduce((s,d) => s + d.amount, 0) / 100000).toFixed(2);
  const cls = yearChange >= 0 ? 'up' : 'down';
  const sign = yearChange >= 0 ? '+' : '';

  document.getElementById('data-count').textContent = data.length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="label">最新收盘价</div>
      <div class="value">¥${last.close.toFixed(2)}</div>
      <div class="change ${last.change >= 0 ? 'up' : 'down'}">${last.change >= 0 ? '+' : ''}${last.change} (${last.pct_chg}%)</div>
    </div>
    <div class="stat-card">
      <div class="label">区间涨跌</div>
      <div class="value ${cls}">${sign}${yearChange.toFixed(2)}</div>
      <div class="change ${cls}">${sign}${yearPct}%</div>
    </div>
    <div class="stat-card">
      <div class="label">一年最高价</div>
      <div class="value up">¥${yearHigh.toFixed(2)}</div>
      <div class="change">区间峰值</div>
    </div>
    <div class="stat-card">
      <div class="label">一年最低价</div>
      <div class="value down">¥${yearLow.toFixed(2)}</div>
      <div class="change">区间谷底</div>
    </div>
    <div class="stat-card">
      <div class="label">日均成交量</div>
      <div class="value">${avgVol}万手</div>
      <div class="change">共 ${data.length} 个交易日</div>
    </div>
    <div class="stat-card">
      <div class="label">区间总成交额</div>
      <div class="value">${totalAmount}亿</div>
      <div class="change">单位：人民币</div>
    </div>
  `;
}

// ===== K线图 =====
function renderKLine() {
  const chart = echarts.init(document.getElementById('kline-chart'));
  const ohlc = data.map(d => [d.open, d.close, d.low, d.high]);

  chart.setOption({
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        const p = params[0];
        const idx = p.dataIndex;
        const d = data[idx];
        const color = d.change >= 0 ? '#e74c3c' : '#27ae60';
        return `<div style="font-weight:600;margin-bottom:4px;">${formatDate(d.date)}</div>
          <div>开盘：<b>${d.open}</b></div>
          <div>收盘：<b style="color:${color}">${d.close}</b></div>
          <div>最高：<b>${d.high}</b></div>
          <div>最低：<b>${d.low}</b></div>
          <div>涨跌幅：<b style="color:${color}">${d.change >= 0 ? '+' : ''}${d.change} (${d.pct_chg}%)</b></div>
          <div>成交量：${(d.vol/10000).toFixed(2)}万手</div>`;
      }
    },
    legend: { data: ['日K'], top: 10 },
    grid: { left: '6%', right: '4%', top: 60, bottom: 80 },
    xAxis: {
      type: 'category',
      data: dates,
      boundaryGap: true,
      axisLine: { lineStyle: { color: '#bdc3c7' } },
      axisLabel: { color: '#7f8c8d' },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      scale: true,
      boundaryGap: [0.05, 0.05],
      axisLine: { lineStyle: { color: '#bdc3c7' } },
      axisLabel: { color: '#7f8c8d', formatter: '¥{value}' },
      splitLine: { lineStyle: { color: '#ecf0f1' } }
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { show: true, type: 'slider', top: '90%', start: 0, end: 100 }
    ],
    series: [{
      name: '日K',
      type: 'candlestick',
      data: ohlc,
      // A股惯例：红涨绿跌
      itemStyle: {
        color: '#e74c3c',        // 阳线（收盘>开盘）红色
        color0: '#27ae60',       // 阴线（收盘<开盘）绿色
        borderColor: '#e74c3c',
        borderColor0: '#27ae60'
      }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

// ===== 成交量图 =====
function renderVolume() {
  const chart = echarts.init(document.getElementById('volume-chart'));
  const vols = data.map(d => ({
    value: d.vol,
    itemStyle: { color: d.close >= d.open ? '#e74c3c' : '#27ae60' }
  }));

  chart.setOption({
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      formatter: function(params) {
        const idx = params[0].dataIndex;
        const d = data[idx];
        return `<div style="font-weight:600;">${formatDate(d.date)}</div>
          <div>成交量：${(d.vol/10000).toFixed(2)}万手</div>
          <div>成交额：${(d.amount/100000).toFixed(2)}亿</div>`;
      }
    },
    grid: { left: '6%', right: '4%', top: 30, bottom: 80 },
    xAxis: {
      type: 'category',
      data: dates,
      axisLine: { lineStyle: { color: '#bdc3c7' } },
      axisLabel: { color: '#7f8c8d' }
    },
    yAxis: {
      type: 'value',
      axisLine: { lineStyle: { color: '#bdc3c7' } },
      axisLabel: { color: '#7f8c8d', formatter: function(v){ return (v/10000).toFixed(0) + '万'; } },
      splitLine: { lineStyle: { color: '#ecf0f1' } }
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { show: true, type: 'slider', top: '90%', start: 0, end: 100 }
    ],
    series: [{
      name: '成交量',
      type: 'bar',
      data: vols,
      barWidth: '60%'
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

// ===== 初始化 =====
renderStats();
renderKLine();
renderVolume();
</script>
